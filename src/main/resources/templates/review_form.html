<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recenzie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow border-0">
        <div class="card-header bg-primary text-white text-center">
            <h4 class="mb-0" th:text="${isEdit} ? '✏ Editează Recenzia' : '⭐ Lasă o Recenzie'"></h4>
        </div>
        <div class="card-body p-4">

            <div class="text-center mb-4">
                <h5 class="text-secondary">Recenzie pentru <span th:text="${targetName}" class="fw-bold text-dark"></span></h5>
            </div>

            <form th:action="@{${postUrl}}" th:object="${review}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-bold">Nota acordată:</label>
                    <select th:field="*{rating}" class="form-select border-primary">
                        <option value="5">⭐⭐⭐⭐⭐ (Excelent)</option>
                        <option value="4">⭐⭐⭐⭐ (Bun)</option>
                        <option value="3">⭐⭐⭐ (Mediu)</option>
                        <option value="2">⭐⭐ (Slab)</option>
                        <option value="1">⭐ (Foarte Slab)</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Părerea ta:</label>
                    <textarea th:field="*{comment}" class="form-control" rows="5"
                              placeholder="Spune-ne cum a fost experiența..."></textarea>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success btn-lg shadow-sm">
                        <span th:text="${isEdit} ? '💾 Salvează Modificările' : '🚀 Trimite Recenzia'"></span>
                    </button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary">Anulează / Înapoi</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
